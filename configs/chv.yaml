# CHV Controller Configuration
# This is the default configuration for MVP-1

# HTTP server settings
http:
  addr: ":8080"

# Data and storage paths
data_root: "/var/lib/chv"
database_path: "/var/lib/chv/chv.db"

# Default network configuration (bridge-backed)
network:
  bridge_name: "chvbr0"
  bridge_cidr: "10.0.0.1/24"
  bridge_gateway: "10.0.0.1"
  network_cidr: "10.0.0.0/24"

# Default storage configuration
storage:
  localdisk_path: "/var/lib/chv/storage/localdisk"
  default_pool_type: "localdisk"

# Cloud Hypervisor settings
cloud_hypervisor:
  binary_path: "/usr/bin/cloud-hypervisor"
