# Controller Configuration with TLS
# Copy this file to /etc/chv/controller.yaml and update the paths

# Server addresses
http_addr: ":8080"
grpc_addr: ":9090"

# Database
database_path: "/var/lib/chv/chv.db"

# Logging
log_level: "info"
log_format: "json"

# TLS Configuration
tls:
  # Enable TLS/mTLS for all connections
  enabled: true
  
  # Server certificate and key paths
  cert: "/etc/chv/certs/controller.crt"
  key: "/etc/chv/certs/controller.key"
  
  # CA certificate for mTLS client verification
  # When provided, the controller will require agents to present valid client certificates
  ca: "/etc/chv/certs/ca.crt"
  
  # Enable automatic certificate generation (for development/testing only)
  # When enabled, certificates will be auto-generated if they don't exist
  auto_generate: false
  
  # Directory for auto-generated certificates
  cert_dir: "/etc/chv/certs"

# CORS configuration (for HTTP API)
cors:
  allowed_origins:
    - "http://localhost:3000"
    - "https://localhost:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-Requested-With"
  allow_credentials: true
  max_age: 300

# JWT configuration for API authentication
jwt_secret: "${CHV_JWT_SECRET}"
token_duration: "24h"
