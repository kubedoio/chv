# CHV Controller Configuration
# This is an example configuration file for the CHV Controller service.
# Copy this to /etc/chv/controller.yaml or use the -config flag.

# Server addresses
http_addr: ":8080"      # HTTP API listen address
grpc_addr: ":9090"      # gRPC listen address for agents

# Database connection
# Format: postgres://user:password@host:port/database?sslmode=disable
database_url: "postgres://chv:chv@localhost:5432/chv?sslmode=disable"

# Logging configuration
log_level: "info"       # debug, info, warn, error
log_format: "json"      # json, text

# Security
jwt_secret: "change-me-in-production"  # JWT signing secret

token_duration: "24h"   # Token validity duration

# CORS configuration for WebUI access
cors:
  # List of allowed origins for cross-origin requests
  # The WebUI at 10.5.199.83 is included by default
  allowed_origins:
    - "http://10.5.199.83"
    - "http://10.5.199.83:3000"
    - "http://localhost"
    - "http://localhost:3000"
    - "http://127.0.0.1"
    - "http://127.0.0.1:3000"
  
  # Allowed HTTP methods
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  
  # Allowed request headers
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-Requested-With"
  
  # Headers exposed to the client
  exposed_headers:
    - "Link"
  
  # Allow credentials (cookies, authorization headers)
  allow_credentials: true
  
  # Preflight cache duration in seconds
  max_age: 300

# Rate limiting configuration
rate_limit:
  # Enable/disable rate limiting globally
  enabled: true

  # Per-IP rate limiting (for unauthenticated requests)
  ip_based:
    enabled: true
    requests_per_minute: 60    # 60 requests per minute per IP
    burst: 10                   # Allow burst of 10 requests

  # Per-user rate limiting (for authenticated requests)
  user_based:
    enabled: true
    requests_per_minute: 120   # 120 requests per minute per user
    burst: 20                   # Allow burst of 20 requests

  # Endpoint-specific rate limits
  # These define the tiers used by the tiered rate limiter:
  # - strict: Expensive operations (VM create, delete, image import)
  # - standard: Normal operations (VM list, get, update)
  # - relaxed: Health checks and light endpoints
  endpoints:
    strict_rpm: 10              # 10 requests per minute (VM create, delete)
    strict_burst: 5             # Burst of 5 for strict endpoints
    standard_rpm: 60            # 60 requests per minute (normal operations)
    standard_burst: 10          # Burst of 10 for standard endpoints
    relaxed_rpm: 300            # 300 requests per minute (health checks)
    relaxed_burst: 50           # Burst of 50 for relaxed endpoints
