# CHV Agent Configuration
# This is an example configuration file for the CHV Agent service.
# Copy this to /etc/chv/agent.yaml or use the -config flag.

# Node identification
# If not set, defaults to system hostname
node_id: "agent-01"

# Server addresses
listen_addr: ":8081"                    # gRPC listen address
controller_addr: "localhost:9090"       # Controller gRPC address

# Data directories
data_dir: "/var/lib/chv-agent"
image_dir: "/var/lib/chv-agent/images"
volume_dir: "/var/lib/chv-agent/volumes"

# Cloud Hypervisor binary path
cloud_hypervisor: "/usr/bin/cloud-hypervisor"

# Network configuration
bridge_name: "br0"                      # Default bridge for VM networking

# Console access
console_port: 8090                      # WebSocket console port

# Logging configuration
log_level: "info"                       # debug, info, warn, error
log_format: "json"                      # json, text

# Heartbeat interval for controller communication
heartbeat_interval: "30s"

# CORS configuration for console WebSocket access
cors:
  allowed_origins:
    - "http://10.5.199.83"
    - "http://10.5.199.83:3000"
    - "http://localhost"
    - "http://localhost:3000"
  allowed_methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
  allow_credentials: true
  max_age: 300
