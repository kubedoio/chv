version: '3.8'

services:
  agent:
    image: chv-agent:latest
    container_name: chv-agent
    privileged: true
    network_mode: host
    pid: host
    volumes:
      - chv-data:/var/lib/chv
      - /dev:/dev
      - /run:/run
      - /lib/modules:/lib/modules:ro
    environment:
      - CHV_AGENT_ADDR=:9090
      - CHV_DATA_ROOT=/var/lib/chv
      - CHV_LOG_LEVEL=info
      - CHV_BRIDGE_NAME=chvbr0
      - CHV_BRIDGE_CIDR=10.0.0.1/24
    restart: unless-stopped

  controller:
    image: chv-controller:latest
    container_name: chv-controller
    ports:
      - "8080:8080"
    volumes:
      - chv-data:/var/lib/chv
    environment:
      - CHV_HTTP_ADDR=:8080
      - CHV_DATA_ROOT=/var/lib/chv
      - CHV_AGENT_URL=http://localhost:9090
      - CHV_LOG_LEVEL=info
      - CHV_LOG_DIR=/var/lib/chv/logs
    network_mode: host
    restart: unless-stopped

volumes:
  chv-data:
    driver: local
