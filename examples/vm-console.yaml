# Serial Console VM Configuration
# ================================
# This example demonstrates VM configuration with serial console enabled
# for debugging, kernel message viewing, and interactive access.
#
# Version: CloudHypervisor v51.1
#
# Console Types in CloudHypervisor:
#   - Console: Primary I/O (stdin/stdout for the VM)
#   - Serial: Serial port for kernel messages and debugging
#
# Access Methods:
#   - tty: Terminal device (/dev/hvc0 for console, /dev/ttyS0 for serial)
#   - file: Log to file
#   - off: Disabled
#
# WebSocket Console Access:
#   The chv-agent provides WebSocket endpoints for browser-based console access.

api_version: "v1"
kind: "VirtualMachine"
metadata:
  id: "vm-console-001"
  name: "console-vm"
  labels:
    feature: "console-enabled"
    purpose: "debug"
    
spec:
  cpu:
    boot_vcpus: 2
    max_vcpus: 4
    
  memory:
    size: 4096M
    mergeable: true
    
  boot:
    mode: "cloud_image"
    
  disks:
    - id: "disk-root"
      path: "/var/lib/chv/volumes/vm-console-disk.raw"
      format: "raw"
      bus: "virtio-blk"
      boot: true
      async_io: true
      
  networks:
    - id: "net-0"
      tap: "tap-console"
      mac: "02:00:00:00:30:01"
      
  # Console Configuration
  # ===================
  # The console provides primary I/O for the VM.
  # In Linux guests, this appears as /dev/hvc0
  
  console:
    # Mode options:
    #   - "off":     Console disabled
    #   - "tty":     Interactive terminal (default for most use cases)
    #   - "file":    Log to file
    mode: "tty"
    
    # When mode is "file", specify the log path:
    # file: "/var/log/chv/vm-console-001-console.log"
    
    # Console resize: Allow terminal resizing
    resize: true
    
  # Serial Port Configuration
  # =========================
  # The serial port is used for:
  #   - Early boot messages (before console driver loads)
  #   - Kernel panic/oops output
  #   - Serial-based debugging
  # In Linux guests, this appears as /dev/ttyS0
  
  serial:
    # Mode options:
    #   - "off":     Serial disabled
    #   - "tty":     Interactive terminal
    #   - "file":    Log to file (good for capturing boot messages)
    #   - "pty":     Allocate pseudo-terminal
    mode: "tty"
    
    # When mode is "file":
    # file: "/var/lib/chv/logs/vm-console-001-serial.log"
    
    # Buffer size for serial data
    buffer_size: 65536
    
  # Alternative: File-based logging for headless operation
  # ------------------------------------------------------
  # Use this configuration to capture all output to files:
  #
  # console:
  #   mode: "file"
  #   file: "/var/log/chv/vm-console.log"
  #   
  # serial:
  #   mode: "file"
  #   file: "/var/log/chv/vm-serial.log"
  
  api_socket:
    path: "/var/run/chv/vm-console.sock"

---
# Guest Kernel Configuration
# ==========================
# For proper console and serial support, ensure your guest kernel
# has these command-line parameters:

# Console parameters (add to kernel cmdline):
#   console=hvc0          # Primary console on virtio console
#   console=ttyS0         # Serial console (for early boot messages)
#   earlyprintk=hvc0      # Early boot messages

# Example kernel cmdline for direct kernel boot:
# cmdline: "console=hvc0 console=ttyS0 earlyprintk=hvc0 root=/dev/vda1 rw"

# For cloud images, these are typically configured in the image.

---
# WebSocket Console Access
# ========================
# The chv-agent exposes WebSocket endpoints for browser-based console access.

# Endpoint: ws://agent-host:8081/vms/{vm-id}/console
#
# Connection example using wscat:
#   npm install -g wscat
#   wscat -c "ws://localhost:8081/vms/vm-console-001/console?token=YOUR_TOKEN"
#
# Connection example using websocat:
#   websocat "ws://localhost:8081/vms/vm-console-001/console?token=YOUR_TOKEN"

# Browser JavaScript example:
# 
# const ws = new WebSocket('ws://localhost:8081/vms/vm-console-001/console?token=YOUR_TOKEN');
# 
# ws.onopen = () => {
#     console.log('Console connected');
# };
# 
# ws.onmessage = (event) => {
#     // event.data contains console output
#     terminal.write(event.data);
# };
# 
# ws.onclose = () => {
#     console.log('Console disconnected');
# };
# 
# // Send input to VM:
# ws.send('ls -la\n');

---
# API Request Example (JSON)
# ==========================
# POST http://localhost:8080/api/v1/vms
# Authorization: Bearer YOUR_TOKEN

{
  "name": "console-vm",
  "cpu": 2,
  "memory_mb": 4096,
  "image_id": "ubuntu-22.04-image-id",
  "disk_size_bytes": 10737418240,
  "networks": [
    {
      "network_id": "default-network-id"
    }
  ]
}

# The console is enabled by default. Access it via:
# GET /api/v1/vms/{vm-id}/console
# Returns WebSocket URL and connection details

---
# Console Management Commands
# ===========================

# Get console information:
# GET http://localhost:8080/api/v1/vms/{vm-id}
# Response includes:
# {
#   "id": "vm-console-001",
#   "name": "console-vm",
#   "state": "running",
#   "console_url": "ws://agent-host:8081/vms/vm-console-001/console",
#   "console_type": "serial"
# }

# Access via chv-agent HTTP API:
# GET http://agent-host:8081/consoles
# Lists all active console sessions

---
# Debugging with Console
# ======================

# 1. Capture kernel boot messages:
#    - Set serial mode to "file"
#    - Check /var/log/chv/vm-serial.log after boot
#
# 2. Debug kernel panics:
#    - Enable both console and serial
#    - Panic messages will appear on serial even if console hangs
#
# 3. Interactive debugging:
#    - Connect via WebSocket console
#    - Use standard Linux debugging tools
#
# 4. Emergency console access:
#    - If VM is unresponsive, check serial log
#    - May contain critical error messages

---
# Cloud-Init with Console Support
# ===============================
# Include in cloud-init user-data to enable serial console:

#cloud-config
runcmd:
  # Enable serial console login
  - systemctl enable serial-getty@ttyS0.service
  - systemctl start serial-getty@ttyS0.service
  
  # Configure GRUB for serial output (for direct kernel boot)
  - sed -i 's/^GRUB_CMDLINE_LINUX_DEFAULT="/GRUB_CMDLINE_LINUX_DEFAULT="console=ttyS0,115200n8 /' /etc/default/grub
  - update-grub

# Alternative: Use write_files for custom serial configuration
write_files:
  - path: /etc/systemd/system/serial-getty@ttyS0.service.d/override.conf
    content: |
      [Service]
      ExecStart=
      ExecStart=-/sbin/agetty -o '-p -- \\u' --keep-baud 115200,38400,9600 ttyS0 $TERM
    permissions: '0644'
