# Ubuntu Cloud Image VM Configuration
# ===================================
# This example demonstrates running an Ubuntu cloud image with cloud-init
# for initial provisioning.
#
# Version: CloudHypervisor v51.1
# Tested with: Ubuntu 22.04 LTS (Jammy Jellyfish)
#
# Required Resources:
#   - Ubuntu cloud image: /var/lib/chv/images/ubuntu-22.04.raw
#   - Download: https://cloud-images.ubuntu.com/jammy/current/
#
# Setup Instructions:
#   1. Download and prepare Ubuntu cloud image:
#      mkdir -p /var/lib/chv/images
#      cd /var/lib/chv/images
#      wget https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img
#      qemu-img convert -f qcow2 -O raw jammy-server-cloudimg-amd64.img ubuntu-22.04.raw
#
#   2. Create a copy-on-write disk for the VM:
#      qemu-img create -f raw -b ubuntu-22.04.raw -F raw vm-ubuntu-disk.raw 20G
#
#   3. Create cloud-init ISO:
#      mkdir -p /var/lib/chv/cloud-init/vm-ubuntu
#      # Copy user-data and meta-data files (see below)
#      mkisofs -o /var/lib/chv/cidata-ubuntu.iso -V cidata -J -r \
#        /var/lib/chv/cloud-init/vm-ubuntu/
#
#   4. Start VM via chv-agent API

api_version: "v1"
kind: "VirtualMachine"
metadata:
  id: "vm-ubuntu-001"
  name: "ubuntu-vm"
  labels:
    environment: "production"
    os: "ubuntu-22.04"
    
spec:
  # CPU: 4 vCPUs with capacity for 8 (hot-plug ready)
  cpu:
    boot_vcpus: 4
    max_vcpus: 8
    
  # Memory: 8GB with hot-plug capability
  memory:
    size: 8192M
    shared: false
    mergeable: true
    hotplug_method: "virtio-mem"
    hotplug_size: 16384M  # Up to 16GB
    
  # Use cloud image boot mode (kernel embedded in image)
  boot:
    mode: "cloud_image"
    
  disks:
    # Primary disk: Ubuntu cloud image
    - id: "disk-root"
      path: "/var/lib/chv/volumes/vm-ubuntu-disk.raw"
      format: "raw"
      bus: "virtio-blk"
      boot: true
      readonly: false
      async_io: true
      queue_size: 256
      
    # Cloud-init configuration drive
    # This ISO contains user-data, meta-data, and network-config
    - id: "disk-cidata"
      path: "/var/lib/chv/cidata-ubuntu.iso"
      format: "raw"
      bus: "virtio-blk"
      boot: false
      readonly: true
      
  networks:
    - id: "net-0"
      tap: "tap-ubuntu"
      mac: "02:00:00:00:00:02"
      model: "virtio-net"
      
  console:
    mode: "off"
    
  serial:
    mode: "tty"
    
  api_socket:
    path: "/var/run/chv/vm-ubuntu.sock"

---
# Cloud-Init Configuration Files
# ==============================
# Create these files before generating the ISO

# user-data
# ----------
#cloud-config
hostname: ubuntu-vm
fqdn: ubuntu-vm.localdomain
manage_etc_hosts: true

users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin
    home: /home/ubuntu
    shell: /bin/bash
    lock_passwd: false
    # Generate with: openssl passwd -6 -salt xyz yourpass
    passwd: "$6$xyz$7t6GHJ7QqR8Qs9T0UV.QQZP1zZp9a7zX3kF8yN2L4mN5oP6qR7sT8uV9wX0yZ1.aB2cD3eF4gH5iJ6kL7mN8o"
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDIhz2GK/XCUj4i6Q5yQJNL1MXMY0RxzPV2QrBqfHrDq user@example.com

# Install packages
packages:
  - qemu-guest-agent
  - htop
  - curl
  - vim

# Run commands on first boot
runcmd:
  - [ systemctl, enable, qemu-guest-agent ]
  - [ systemctl, start, qemu-guest-agent ]
  - echo "VM provisioned by CHV" > /etc/motd

# meta-data
# ---------
instance-id: ubuntu-vm-001
local-hostname: ubuntu-vm

# network-config (optional, for static IP)
# ----------------------------------------
version: 2
ethernets:
  eth0:
    dhcp4: false
    addresses:
      - 192.168.100.10/24
    gateway4: 192.168.100.1
    nameservers:
      addresses:
        - 8.8.8.8
        - 8.8.4.4

---
# API Request Example (JSON)
# ==========================
# POST http://localhost:8080/api/v1/vms
# Authorization: Bearer YOUR_TOKEN

{
  "name": "ubuntu-vm",
  "cpu": 4,
  "memory_mb": 8192,
  "image_id": "ubuntu-22.04-image-id",
  "disk_size_bytes": 21474836480,
  "networks": [
    {
      "network_id": "default-network-id",
      "dhcp": true
    }
  ],
  "cloud_init": {
    "user_data": "#cloud-config\nhostname: ubuntu-vm\nusers:\n  - name: ubuntu\n    sudo: ALL=(ALL) NOPASSWD:ALL\n    ssh_authorized_keys:\n      - ssh-ed25519 AAAAC3... user@example.com\n",
    "meta_data": "instance-id: ubuntu-vm-001\nlocal-hostname: ubuntu-vm\n"
  }
}

---
# Managing the VM
# ===============

# Start the VM:
# POST /api/v1/vms/{vm-id}/start

# Access serial console:
# wscat -c ws://agent-host:8081/vms/{vm-id}/console?token=YOUR_TOKEN

# Check VM info via CloudHypervisor API:
# curl --unix-socket /var/run/chv/vm-ubuntu.sock http://localhost/api/v1/vm.info

# Graceful shutdown:
# POST /api/v1/vms/{vm-id}/stop

# Force stop:
# POST /api/v1/vms/{vm-id}/stop (with force=true in body)
