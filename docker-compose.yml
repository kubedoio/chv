services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: chv-controller
    ports:
      - "8088:8080"
    volumes:
      - chv-data:/var/lib/chv
    environment:
      - CHV_HTTP_ADDR=:8080
      - CHV_DATA_ROOT=/var/lib/chv
      - CHV_AGENT_URL=http://localhost:9090
      - CHV_LOG_LEVEL=info
      - CHV_LOG_DIR=/var/lib/chv/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  chv-data:
    driver: local
