services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: chv-controller
    restart: unless-stopped
    environment:
      CHV_HTTP_ADDR: ":8080"
      CHV_DATA_ROOT: /var/lib/chv
      CHV_DATABASE_PATH: /var/lib/chv/chv.db
      CHV_BRIDGE_NAME: ${CHV_BRIDGE_NAME:-chvbr0}
      CHV_BRIDGE_CIDR: ${CHV_BRIDGE_CIDR:-10.0.0.1/24}
      CHV_LOCALDISK_PATH: /var/lib/chv/storage/localdisk
    volumes:
      - chv_controlplane_data:/var/lib/chv
    ports:
      - "${CHV_CONTROLLER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  webui:
    build:
      context: ./ui
    container_name: chv-webui
    restart: unless-stopped
    depends_on:
      controller:
        condition: service_healthy
    environment:
      PUBLIC_CHV_API_BASE_URL: ${PUBLIC_CHV_API_BASE_URL:-http://localhost:8080/api/v1}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - "${CHV_WEBUI_PORT:-3000}:3000"

volumes:
  chv_controlplane_data:

