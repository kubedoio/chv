services:
  controller:
    build:
      context: .
      dockerfile: Dockerfile.controller
    container_name: chv-controller
    ports:
      - "8088:8080"
    volumes:
      - chv-data:/var/lib/chv
    environment:
      - CHV_HTTP_ADDR=:8080
      - CHV_DATA_ROOT=/var/lib/chv
      - CHV_AGENT_URL=http://10.5.199.83:9090
      - CHV_LOG_LEVEL=info
      - CHV_LOG_DIR=/var/lib/chv/logs
    # Local agent is now optional; remote agent 10.5.199.83 is target
    # depends_on:
    #   - agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: chv-agent
    privileged: true # Required for TAP device management
    volumes:
      - chv-data:/var/lib/chv
    environment:
      - CHV_AGENT_ADDR=:9090
      - CHV_DATA_ROOT=/var/lib/chv
      - CHV_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:9090/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  chv-data:
    driver: local
