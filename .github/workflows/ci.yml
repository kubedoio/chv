name: CI

# Version bumps are handled manually via:
#   make bump-version BUMP_TYPE=build
# See scripts/bump-version.sh for details.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  ui:
    name: UI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Build UI
        run: cd ui && npm run build

      - name: Run check (if exists)
        run: |
          cd ui
          if node -e "const pkg=require('./package.json'); if(pkg.scripts&&pkg.scripts.check){process.exit(0)}else{process.exit(1)}"; then
            npm run check
          else
            echo "check script not found in package.json, skipping"
          fi

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: ui
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Install Playwright browsers
        run: cd ui && npx playwright install --with-deps

      - name: Build UI
        run: cd ui && npm run build

      - name: Run Playwright tests
        run: cd ui && npm run test:e2e
