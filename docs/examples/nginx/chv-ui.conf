server {
    listen 80;
    server_name _;

    root /opt/chv/ui;
    index index.html;

    # Static assets — fallback to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache index.html so SPA updates are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Immutable hashed assets can be cached forever
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Proxy legacy API calls to the control plane HTTP admin API
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }

    # Proxy BFF endpoints to the control plane HTTP listener
    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors off;
    }

    # WebSocket proxy for serial console
    # BFF generates /ws/vms/{vm_id}/console?token=... — strip /ws/ prefix here
    location /ws/vms/ {
        proxy_pass http://127.0.0.1:8444/vms/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Optional: gzip for better performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;
}
